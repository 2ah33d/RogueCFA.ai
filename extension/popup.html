<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RogueCFA MarketCall Extractor</title>
  <style>
    :root {
      --bg: #0a0e17;
      --card: #131a2a;
      --prime: #f1f5f9;
      --dim: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #1e293b;
      --danger: #ef4444;
      --success: #10b981;
    }
    body {
      width: 330px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--prime);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--prime);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge {
      font-size: 10px;
      font-family: monospace;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--prime);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
    }
    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:disabled {
      background: var(--border);
      color: var(--dim);
      cursor: not-allowed;
    }
    #status {
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.4;
      text-align: center;
      min-height: 18px;
    }
    .error { color: var(--danger); }
    .success { color: var(--success); font-weight: 600; }
    .info { color: var(--dim); }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">⚡ RogueCFA.ai Extractor</div>
    <span class="badge">v1.0</span>
  </div>

  <div class="section">
    <label for="apiUrl">Your RogueCFA App URL</label>
    <input type="text" id="apiUrl" placeholder="https://your-app.vercel.app or http://localhost:5173" />
  </div>

  <div class="section" id="videoInfoSection" style="display: none;">
    <label>Current Video</label>
    <div id="videoTitle" style="font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></div>
  </div>

  <button id="extractBtn">Extract &amp; Summarize on RogueCFA</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
